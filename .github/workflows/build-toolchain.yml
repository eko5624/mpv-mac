
name: build-tools

on:
  #schedule:
  #  - cron: '10 0 * * MON'
  workflow_dispatch:
    inputs:   
      arch:
        description: "Build target"
        required: false
        default: "x86_64"
        type: choice
        options:
        - x86_64
        - arm64
      os:
        description: "Building tools for arm64/x86_64 arch"
        required: false
        default: "macos-13"
        type: choice
        options:
        - macos-13
        - macos-14

jobs:
  build:
    runs-on: ${{ inputs.os }}
    env:
      ARCHS: ${{ inputs.arch }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Checkout
      uses: actions/checkout@main
    - name: Loading tools-${{ inputs.arch }} cache
      uses: actions/cache@main
      with:
        path: ${{ github.workspace }}/tools
        key: tools-${{ inputs.arch }}
        restore-keys: tools-
    - name: Switch to Xcode 15.2
      run: |
        sudo xcode-select --reset
        sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer   
    - name: Remove stray upstream python binary symlinks under /usr/local
      run: |
        find /usr/local/bin -lname '*/Library/Frameworks/Python.framework/*' -delete -print
        brew unlink python
    - name: Build tools
      run: |
        chmod +x ./build-tools.sh
        ./build-tools.sh
    - name: Get current timestamp
      run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_ENV 
    - name: Zip tools-${{ inputs.arch }} 
      continue-on-error: true
      run: |
        zip -r -y tools-$ARCHS-${{ env.date }}.zip tools/*
        cp tools-$ARCHS-${{ env.date }}.zip tools-$ARCHS-latest.zip
    - name: Delete
      uses: mknejp/delete-release-assets@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: tools
        assets: tools-$ARCHS-latest.zip
        fail-if-no-assets: false
        fail-if-no-release: false
    - name: Upload
      continue-on-error: true
      uses: softprops/action-gh-release@v2
      with:
        tag_name: tools
        name: tools
        files: tools*.zip

